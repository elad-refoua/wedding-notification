services:
  - type: web
    name: wedding-notification
    runtime: node
    region: frankfurt
    plan: free
    branch: master
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DASHBOARD_TOKEN
        sync: false
      - key: TZ
        value: Asia/Jerusalem
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
