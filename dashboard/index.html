<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול חתונה — בית</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <span class="brand">💍 ניהול חתונה</span>
    <a href="index.html">בית</a>
    <a href="guests.html">אורחים</a>
    <a href="messages.html">הודעות</a>
    <a href="reminders.html">תזכורות</a>
    <a href="settings.html">הגדרות</a>
    <a href="export.html">ייצוא</a>
    <a href="guide.html">מדריך</a>
    <a href="#" onclick="sessionStorage.removeItem('dashToken');location.href='/dashboard/login.html'" style="margin-right:auto">יציאה</a>
  </nav>

  <div class="container">
    <h1 class="page-title">סטטוס אורחים</h1>

    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card coming">
        <div class="stat-value" id="statComing">—</div>
        <div class="stat-label">מגיעים</div>
      </div>
      <div class="stat-card not-coming">
        <div class="stat-value" id="statNotComing">—</div>
        <div class="stat-label">לא מגיעים</div>
      </div>
      <div class="stat-card undecided">
        <div class="stat-value" id="statUndecided">—</div>
        <div class="stat-label">מתלבטים</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-value" id="statPending">—</div>
        <div class="stat-label">ממתינים</div>
      </div>
      <div class="stat-card total">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">סה"כ נפשות</div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span>התקדמות אישורים</span>
        <span id="progressText">0 / 400</span>
      </div>
      <div class="progress-bar">
        <div class="fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Send Invitations -->
    <div class="card" id="sendCard" style="display:none;">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem;">
        <div>
          <h2 style="font-size:1.1rem; margin:0;">שליחת הזמנות</h2>
          <p style="color:#94a3b8; margin:0.25rem 0 0; font-size:0.85rem;" id="pendingInfo"></p>
        </div>
        <button class="btn btn-primary" onclick="sendInvitations()" id="sendBtn">שלח הזמנות לממתינים</button>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="card">
      <h2 style="font-size:1.1rem; margin-bottom:1rem;">פעילות אחרונה</h2>
      <div id="activityFeed">
        <div class="empty-state"><span class="spinner"></span> טוען...</div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // NOTE: All dynamic content is sanitized via escapeHtml() before DOM insertion.
    // This is a local admin dashboard behind auth middleware, not a public-facing page.
    const GOAL = 400;

    async function loadStats() {
      try {
        const s = await api('/stats');
        document.getElementById('statComing').textContent = s.total_people || 0;
        document.getElementById('statNotComing').textContent = s.not_coming || 0;
        document.getElementById('statUndecided').textContent = s.undecided || 0;
        document.getElementById('statPending').textContent = s.pending || 0;
        document.getElementById('statTotal').textContent = s.total_people || 0;

        const pct = Math.min(100, Math.round(((s.total_people || 0) / GOAL) * 100));
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = (s.total_people || 0) + ' / ' + GOAL;

        // Show send card if there are pending guests
        const sendCard = document.getElementById('sendCard');
        if (s.pending > 0) {
          sendCard.style.display = 'block';
          document.getElementById('pendingInfo').textContent = s.pending + ' אורחים ממתינים לשליחת הזמנה';
        } else {
          sendCard.style.display = 'none';
        }
      } catch (e) {
        showToast('שגיאה בטעינת סטטיסטיקות: ' + e.message, 'error');
      }
    }

    async function sendInvitations() {
      var btn = document.getElementById('sendBtn');
      var pending = document.getElementById('statPending').textContent;
      if (!confirm('לשלוח הזמנות ל-' + pending + ' אורחים ממתינים?')) return;
      btn.disabled = true;
      btn.textContent = 'שולח...';
      try {
        var result = await api('/send-invitations', { method: 'POST', body: JSON.stringify({}) });
        showToast(result.message || 'שליחה החלה', 'success');
        setTimeout(refresh, 3000);
      } catch (e) {
        showToast('שגיאה: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'שלח הזמנות לממתינים';
      }
    }

    const STATUS_LABEL = {
      sent: '✓ נשלח',
      delivered: '✓✓ נמסר',
      read: '✓✓ נקרא',
      failed: '✗ נכשל',
      undelivered: '✗ לא נמסר',
      received: '💬 תשובה'
    };
    const STATUS_COLOR = {
      sent: '#4ade80', delivered: '#22c55e', read: '#16a34a',
      failed: '#f87171', undelivered: '#f87171', received: '#0ea5e9'
    };

    function addStat(container, color, text) {
      var span = document.createElement('span');
      span.style.color = color;
      span.textContent = text;
      container.appendChild(span);
    }

    async function loadActivity() {
      try {
        const data = await api('/activity?limit=20');
        const feed = document.getElementById('activityFeed');
        feed.textContent = '';

        var statsLine = document.createElement('div');
        statsLine.style.cssText = 'display:flex; gap:1.5rem; padding:0.5rem 0.75rem; background:#0f172a; border-radius:6px; margin-bottom:0.75rem; font-size:0.85rem;';
        addStat(statsLine, '#4ade80', '✓ ' + data.counts.outgoing_sent + ' נשלחו');
        addStat(statsLine, '#f87171', '✗ ' + data.counts.outgoing_failed + ' נכשלו');
        addStat(statsLine, '#0ea5e9', '💬 ' + data.counts.incoming + ' תשובות');
        var totalSpan = document.createElement('span');
        totalSpan.style.cssText = 'color:#64748b; margin-right:auto;';
        totalSpan.textContent = data.counts.total + ' סה"כ';
        statsLine.appendChild(totalSpan);
        feed.appendChild(statsLine);

        if (!data.rows.length) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.textContent = 'אין פעילות עדיין. לחץ "שלח הזמנות" כדי להתחיל.';
          feed.appendChild(empty);
          return;
        }

        data.rows.forEach(function(m) {
          var item = document.createElement('div');
          item.className = 'feed-item';
          item.style.borderRight = '3px solid ' + (STATUS_COLOR[m.status] || '#334155');
          item.style.paddingRight = '0.75rem';
          item.style.marginBottom = '0.5rem';

          var time = document.createElement('span');
          time.className = 'feed-time';
          time.textContent = formatDate(m.created_at);
          item.appendChild(time);

          var text = document.createElement('span');
          text.className = 'feed-text';

          var statBadge = document.createElement('span');
          statBadge.className = 'badge';
          statBadge.style.cssText = 'font-size:0.7rem; margin-left:0.4rem; background:#1e293b; color:' + (STATUS_COLOR[m.status] || '#cbd5e1');
          statBadge.textContent = STATUS_LABEL[m.status] || m.status;
          text.appendChild(statBadge);

          var chBadge = document.createElement('span');
          chBadge.className = 'badge';
          chBadge.style.cssText = 'font-size:0.65rem; margin-left:0.4rem; background:' + (m.channel === 'whatsapp' ? '#166534' : '#334155') + '; color:#fff;';
          chBadge.textContent = m.channel === 'whatsapp' ? 'WA' : 'SMS';
          text.appendChild(chBadge);

          var strong = document.createElement('strong');
          strong.textContent = ' ' + (m.guest_name || 'לא ידוע');
          text.appendChild(strong);

          if (m.content) {
            var body = m.content || '';
            var bodyText = document.createTextNode(': ' + (body.length > 80 ? body.substring(0, 80) + '...' : body));
            text.appendChild(bodyText);
          }

          item.appendChild(text);

          if ((m.status === 'failed' || m.status === 'undelivered') && m.error) {
            var err = document.createElement('div');
            err.style.cssText = 'font-size:0.8rem; color:#fca5a5; margin-top:0.25rem; padding-right:1.2rem;';
            err.textContent = 'סיבה: ' + m.error;
            item.appendChild(err);
          }

          feed.appendChild(item);
        });

        var linkAll = document.createElement('div');
        linkAll.style.cssText = 'margin-top:0.75rem; text-align:center;';
        var link = document.createElement('a');
        link.href = 'messages.html';
        link.style.color = '#0ea5e9';
        link.textContent = 'הצג פעילות מלאה →';
        linkAll.appendChild(link);
        feed.appendChild(linkAll);
      } catch (e) {
        var feed = document.getElementById('activityFeed');
        feed.textContent = '';
        var empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'שגיאה בטעינת פעילות: ' + e.message;
        feed.appendChild(empty);
      }
    }

    async function refresh() {
      await Promise.all([loadStats(), loadActivity()]);
    }

    document.addEventListener('DOMContentLoaded', function() {
      refresh();
      setInterval(refresh, 5000);
    });
  </script>
</body>
</html>
