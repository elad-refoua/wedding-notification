<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול חתונה — אורחים</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <span class="brand">💍 ניהול חתונה</span>
    <a href="index.html">בית</a>
    <a href="guests.html">אורחים</a>
    <a href="messages.html">הודעות</a>
    <a href="reminders.html">תזכורות</a>
    <a href="settings.html">הגדרות</a>
    <a href="export.html">ייצוא</a>
    <a href="guide.html">מדריך</a>
    <a href="#" onclick="sessionStorage.removeItem('dashToken');location.href='/dashboard/login.html'" style="margin-right:auto">יציאה</a>
  </nav>

  <div class="container">
    <h1 class="page-title">ניהול אורחים</h1>

    <!-- Filters -->
    <div class="filter-row">
      <div class="form-group">
        <label>סטטוס</label>
        <select id="filterStatus">
          <option value="">הכל</option>
          <option value="coming">מגיע</option>
          <option value="not_coming">לא מגיע</option>
          <option value="undecided">מתלבט</option>
          <option value="pending">ממתין</option>
          <option value="invited">הוזמן</option>
          <option value="opted_out">הוסר</option>
        </select>
      </div>
      <div class="form-group">
        <label>צד</label>
        <select id="filterSide">
          <option value="">הכל</option>
          <option value="groom">חתן</option>
          <option value="bride">כלה</option>
          <option value="both">משותף</option>
        </select>
      </div>
      <div class="form-group" style="flex:1; min-width:200px;">
        <label>חיפוש</label>
        <input type="text" id="filterSearch" placeholder="שם או טלפון...">
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn btn-primary" onclick="openAddModal()">+ הוסף אורח</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>שם</th>
            <th>טלפון</th>
            <th>צד</th>
            <th>קבוצה</th>
            <th>סטטוס</th>
            <th>מוזמנים</th>
            <th>מגיעים</th>
            <th>פעולות</th>
          </tr>
        </thead>
        <tbody id="guestsBody">
          <tr><td colspan="8" class="empty-state"><span class="spinner"></span> טוען...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Import Section -->
    <div class="card" style="margin-top:1.5rem;">
      <h2 style="font-size:1rem; margin-bottom:0.75rem;">ייבוא מאקסל</h2>
      <div style="display:flex; gap:0.75rem; align-items:flex-end; flex-wrap:wrap;">
        <div class="form-group" style="flex:1;">
          <label>נתיב קובץ Excel</label>
          <input type="text" id="importPath" placeholder="C:\path\to\guests.xlsx">
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn btn-success" onclick="importExcel()">ייבוא</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="guestModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">הוסף אורח</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="guestForm" onsubmit="saveGuest(event)">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>שם *</label>
          <input type="text" id="fName" required>
        </div>
        <div class="form-group">
          <label>טלפון *</label>
          <input type="tel" id="fPhone" required dir="ltr">
        </div>
        <div class="form-group">
          <label>צד</label>
          <select id="fSide">
            <option value="">—</option>
            <option value="groom">חתן</option>
            <option value="bride">כלה</option>
            <option value="">משותף</option>
          </select>
        </div>
        <div class="form-group">
          <label>קבוצה</label>
          <input type="text" id="fGroup">
        </div>
        <div class="form-group">
          <label>מספר מוזמנים</label>
          <input type="number" id="fInvited" min="1" value="1">
        </div>
        <div class="form-group">
          <label>מספר מגיעים</label>
          <input type="number" id="fComing" min="0" value="0">
        </div>
        <div class="form-group">
          <label>סטטוס</label>
          <select id="fStatus">
            <option value="pending">ממתין</option>
            <option value="invited">הוזמן</option>
            <option value="coming">מגיע</option>
            <option value="not_coming">לא מגיע</option>
            <option value="undecided">מתלבט</option>
            <option value="opted_out">הוסר</option>
          </select>
        </div>
        <div class="form-group">
          <label>הערות</label>
          <textarea id="fNotes" rows="2"></textarea>
        </div>
        <div style="display:flex; gap:0.75rem; justify-content:flex-start; margin-top:1rem;">
          <button type="submit" class="btn btn-primary">שמור</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal()">ביטול</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // NOTE: All dynamic content is sanitized via escapeHtml() or built with safe DOM
    // methods. This is a local admin dashboard behind auth middleware.
    var allGuests = [];

    async function loadGuests() {
      try {
        var params = new URLSearchParams();
        var status = document.getElementById('filterStatus').value;
        var side = document.getElementById('filterSide').value;
        var search = document.getElementById('filterSearch').value.trim();
        if (status) params.set('status', status);
        if (side) params.set('side', side);
        if (search) params.set('search', search);

        allGuests = await api('/guests?' + params.toString());
        renderGuests();
      } catch (e) {
        showToast('שגיאה: ' + e.message, 'error');
      }
    }

    function renderGuests() {
      var tbody = document.getElementById('guestsBody');
      tbody.textContent = '';

      if (!allGuests.length) {
        var tr = document.createElement('tr');
        var td = document.createElement('td');
        td.colSpan = 8;
        td.className = 'empty-state';
        td.textContent = 'אין אורחים להצגה';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      allGuests.forEach(function(g) {
        var tr = document.createElement('tr');

        var tdName = document.createElement('td');
        tdName.textContent = g.name;
        tr.appendChild(tdName);

        var tdPhone = document.createElement('td');
        tdPhone.dir = 'ltr';
        tdPhone.style.textAlign = 'right';
        tdPhone.textContent = g.phone;
        tr.appendChild(tdPhone);

        var tdSide = document.createElement('td');
        tdSide.textContent = sideLabel(g.side);
        tr.appendChild(tdSide);

        var tdGroup = document.createElement('td');
        tdGroup.textContent = g.group_name || '';
        tr.appendChild(tdGroup);

        var tdStatus = document.createElement('td');
        var badge = document.createElement('span');
        badge.className = statusClass(g.status);
        badge.textContent = statusLabel(g.status);
        tdStatus.appendChild(badge);
        tr.appendChild(tdStatus);

        var tdInvited = document.createElement('td');
        tdInvited.textContent = g.num_invited || 0;
        tr.appendChild(tdInvited);

        var tdComing = document.createElement('td');
        tdComing.textContent = g.num_coming || 0;
        tr.appendChild(tdComing);

        var tdActions = document.createElement('td');
        tdActions.className = 'actions';
        var btnEdit = document.createElement('button');
        btnEdit.className = 'btn btn-sm btn-secondary';
        btnEdit.textContent = 'ערוך';
        btnEdit.addEventListener('click', function() { editGuest(g.id); });
        tdActions.appendChild(btnEdit);

        var btnDel = document.createElement('button');
        btnDel.className = 'btn btn-sm btn-danger';
        btnDel.textContent = 'מחק';
        btnDel.addEventListener('click', function() { deleteGuest(g.id, g.name); });
        tdActions.appendChild(btnDel);

        tr.appendChild(tdActions);
        tbody.appendChild(tr);
      });
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'הוסף אורח';
      document.getElementById('editId').value = '';
      document.getElementById('guestForm').reset();
      document.getElementById('fInvited').value = 1;
      document.getElementById('fComing').value = 0;
      document.getElementById('guestModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('guestModal').classList.remove('open');
    }

    function editGuest(id) {
      var g = allGuests.find(function(x) { return x.id === id; });
      if (!g) return;
      document.getElementById('modalTitle').textContent = 'עריכת אורח';
      document.getElementById('editId').value = g.id;
      document.getElementById('fName').value = g.name || '';
      document.getElementById('fPhone').value = g.phone || '';
      document.getElementById('fSide').value = g.side || '';
      document.getElementById('fGroup').value = g.group_name || '';
      document.getElementById('fInvited').value = g.num_invited || 1;
      document.getElementById('fComing').value = g.num_coming || 0;
      document.getElementById('fStatus').value = g.status || 'pending';
      document.getElementById('fNotes').value = g.notes || '';
      document.getElementById('guestModal').classList.add('open');
    }

    async function saveGuest(e) {
      e.preventDefault();
      var id = document.getElementById('editId').value;
      var data = {
        name: document.getElementById('fName').value,
        phone: document.getElementById('fPhone').value,
        side: document.getElementById('fSide').value || null,
        group_name: document.getElementById('fGroup').value || null,
        num_invited: parseInt(document.getElementById('fInvited').value) || 1,
        num_coming: parseInt(document.getElementById('fComing').value) || 0,
        status: document.getElementById('fStatus').value,
        notes: document.getElementById('fNotes').value || null
      };
      try {
        if (id) {
          await api('/guests/' + id, { method: 'PUT', body: JSON.stringify(data) });
          showToast('אורח עודכן בהצלחה', 'success');
        } else {
          await api('/guests', { method: 'POST', body: JSON.stringify(data) });
          showToast('אורח נוסף בהצלחה', 'success');
        }
        closeModal();
        loadGuests();
      } catch (err) {
        showToast('שגיאה: ' + err.message, 'error');
      }
    }

    async function deleteGuest(id, name) {
      if (!confirm('למחוק את ' + name + '?')) return;
      try {
        await api('/guests/' + id, { method: 'DELETE' });
        showToast('אורח נמחק', 'success');
        loadGuests();
      } catch (err) {
        showToast('שגיאה: ' + err.message, 'error');
      }
    }

    async function importExcel() {
      var filePath = document.getElementById('importPath').value.trim();
      if (!filePath) { showToast('נא להזין נתיב קובץ', 'error'); return; }
      try {
        var result = await api('/import', { method: 'POST', body: JSON.stringify({ filePath: filePath }) });
        showToast('ייבוא הושלם: ' + (result.imported || 0) + ' אורחים', 'success');
        loadGuests();
      } catch (err) {
        showToast('שגיאת ייבוא: ' + err.message, 'error');
      }
    }

    // Filter listeners
    document.getElementById('filterStatus').addEventListener('change', loadGuests);
    document.getElementById('filterSide').addEventListener('change', loadGuests);
    var searchTimeout;
    document.getElementById('filterSearch').addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(loadGuests, 400);
    });

    // Close modal on overlay click
    document.getElementById('guestModal').addEventListener('click', function(e) {
      if (e.target === e.currentTarget) closeModal();
    });

    document.addEventListener('DOMContentLoaded', loadGuests);
  </script>
</body>
</html>
